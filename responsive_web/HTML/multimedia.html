<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Player</title>
</head>

<body>
    <h1>Pirate YouTube</h1>
    <section>
        <h2>Sailing Away</h2>
        <audio controls aria-label="sailing-away"><source src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" type="audio/mp3"></audio>
    </section>
    <section>
        <h2>What is the Map Method and How Does it Work?</h2>
        <video controls width="640" aria-label="coding-video">
            <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
            <track src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt" kind="captions" label="coding-video" srclang="en">
        </video>
    </section>
    <section>
        <h2>Transcript</h2>
        <p>The video...</p>
    </section>
</body>

</html>
