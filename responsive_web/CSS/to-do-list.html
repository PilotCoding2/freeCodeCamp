<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="todo-styles.css">
</head>

<body>
    

    
    <main>
        <h1>My Everyday To-Do List</h1>
        <ul class="todo-list">
            <li>
                <input type="checkbox" id="water">
                <label for="water">Drinking water</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://music.youtube.com/watch?v=m7nwbJLO9qo&si=u839Z8WWSVa1s94y" target="_blank">3 liters a day</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="praying">
                <label for="praying">Thanking God</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://music.youtube.com/watch?v=m7nwbJLO9qo&si=u839Z8WWSVa1s94y" target="_blank">Thanking Him for all blessings</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="work">
                <label for="work">Work</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://music.youtube.com/watch?v=m7nwbJLO9qo&si=u839Z8WWSVa1s94y" target="_blank">Daily shift</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="sleep">
                <label for="sleep">Sleep 8 hours</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" href="https://music.youtube.com/watch?v=m7nwbJLO9qo&si=u839Z8WWSVa1s94y" target="_blank">Goodnight</a>
                    </li>
                </ul>
            </li>
        </ul>
    </main>
</body>
</html>
