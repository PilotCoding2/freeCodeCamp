<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="quiz-styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Quiz page for students.">
    <title>Student Quiz Page</title>
  </head>
  <body>
    <header>
        <img id="logo" src="https://cdn.freecodecamp.org/platform/universal/fcc_primary.svg" alt="freeCodeCamp">
        <h1>HTML/CSS Quiz</h1>
        <nav>
            <ul>
                <li><a href="#student-info">INFO</a></li>
                <li><a href="#html-questions">HTML</a></li>
                <li><a href="#css-questions">CSS</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form action="https://freecodecamp.org/practice-project/accessibility-quiz" method="post">
            <section role="region" aria-labelledby="student-info">
                <h2 id="student-info">Student Info</h2>
                <div class="info">
                    <label for="student-name">Name</label>
                    <input id="student-name" type="text" name="student-name">
                </div>
                <div class="info">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email">
                </div>
                <div class="info">
                    <label for="dob">Date of Birth</label>
                    <input id="dob" type="date" name="dob">
                </div>
            </section>
            <section role="region" aria-labelledby="html-questions">
                <h2 id="html-questions">HTML Questions</h2>
                <div class="question-block">
                   <h3><span class="sr-only">Question</span>1</h3>
                    <fieldset class="question" name="question-1">
                        <legend>HTML is the skeleton of a webpage</legend>
                        <ul class="answers-list">
                            <li>
                                <label for="q1-a1">
                                    <input type="radio" id="q1-a1" value="true" name="part-1">
                                    True
                                </label>
                            </li>
                            <li>
                                <label for="q1-a2">
                                    <input type="radio" id="q1-a2" value="false" name="part-1">
                                    False
                                </label>
                            </li>
                        </ul>
                    </fieldset>
                </div>
                <div class="question-block">
                    <h3><span class="sr-only">Question</span>2</h3>
                    <fieldset class="question" name="question-2">
                        <legend>HTML stands for Hyper Text Markup Language</legend>
                        <ul class="answers-list">
                            <li>
                                <label for="q2-a1">
                                    <input type="radio" id="q2-a1" value="true" name="part-2">
                                    True
                                </label>
                            </li>
                            <li>
                                <label for="q2-a2">
                                    <input type="radio" id="q2-a2" value="false" name="part-2">
                                    False
                                </label>
                            </li>
                        </ul>
                    </fieldset>
                </div>
            </section>
            <section role="region" aria-labelledby="css-questions">
                <h2 id="css-questions">CSS Questions</h2>
                <div class="formrow">
                    <div class="question-block">
                        <label for="selector">Does CSS stand for 'Cascading Styling Sheets'?</label>
                    </div>
                    <div class="answer">
                        <select required id="selector" name="selector">
                            <option value="">Select an option</option>
                            <option value="yes">Yes</option>
                            <option value="no">No</option>
                        </select>
                    </div>
                    <div class="question-block">
                        <label for="textarea">CDo you have any questions:</label>
                    </div>
                    <div class="answer">
                        <textarea rows="10" cols="50" name="textarea" id="textarea"></textarea>
                    </div>
                </div>
            </section>
            <button type="submit">Send</button>
        </form>
    </main>
    <footer>
        <address>
            <a href="https://freecodecamp.org">freeCodeCamp</a> <br />
            San Francisco <br />
            California <br />
            USA    
        </address>
    </footer>
  </body>
</html>
